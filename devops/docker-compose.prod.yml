services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - webapp_nail_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      TZ: Asia/Ho_Chi_Minh
    command: sh -c "npx prisma migrate deploy && npm run start:prod"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  webapp_nail_postgres_data:
