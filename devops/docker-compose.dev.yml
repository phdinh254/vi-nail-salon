services:
  postgres:
    image: postgres:17-alpine
    container_name: webapp-nail-postgres-dev
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - webapp_nail_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ../backend
    container_name: webapp-nail-backend-dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me}
      PORT: 3001
      TZ: Asia/Ho_Chi_Minh
    command: sh -c "npx prisma migrate deploy && npm run start:prod"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    container_name: webapp-nail-frontend-dev
    restart: unless-stopped
    environment:
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  webapp_nail_postgres_data:
